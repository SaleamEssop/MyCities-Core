# MyCities-Core — HTTP only (same pattern as Cline; no /web-app, no SSL)
server {
    listen 80;
    server_name _ localhost;
    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass mycities-core-laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # Images/fonts: long cache (content-addressed by filename)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # JS/CSS: short cache with revalidation so stale builds don't persist
    location ~* \.(js|css)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    location ~ /\. {
        deny all;
    }
}
